{% extends "base.html" %}
{% block title %}我的简历{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>我的简历</h1>
  <form method="post" action="{{ url_for('resume.resume_create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button class="btn btn-success">新建简历</button>
  </form>
</div>

{% if resumes %}
<div class="list-group">
  {% for r in resumes %}
  <div class="list-group-item d-flex justify-content-between align-items-center">
    <div>
      <div class="fw-semibold">{{ r.title }}</div>
      <div class="text-muted small">更新时间：{{ r.updated_at }}</div>
    </div>
    <div class="btn-group">
      <a class="btn btn-outline-primary btn-sm" href="{{ url_for('resume.resume_edit', resume_id=r.id) }}">编辑</a>
      <form method="post" action="{{ url_for('resume.resume_delete', resume_id=r.id) }}" onsubmit="return confirm('确认删除？')">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="btn btn-outline-danger btn-sm">删除</button>
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p>还没有简历，点击右上角“新建简历”创建第一份。</p>
{% endif %}
{% endblock %}
