<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Resume Builder{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container py-3">
<nav class="d-flex gap-3 mb-3">
  <a href="/">首页</a>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('resume.resume_list') }}">我的简历</a>
    <a href="{{ url_for('auth.logout') }}">退出</a>
  {% else %}
    <a href="{{ url_for('auth.login_form') }}">登录</a>
    <a href="{{ url_for('auth.register_form') }}">注册</a>
  {% endif %}
</nav>

{% for message in get_flashed_messages(with_categories=true) %}
<div class="alert alert-{{ 'success' if message[0]=='success' else 'danger' }}">{{ message[1] }}</div>
{% endfor %}

{% block content %}{% endblock %}
</body>
</html>
